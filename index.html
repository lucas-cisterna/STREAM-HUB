<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Hub Premium</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar">

    <div class="logo">▶ HUB</div>

    <button>🏠 Início</button>
    <button>🔥 Em Alta</button>
    <button>🎵 Música</button>
    <button>🎬 Filmes</button>
    <button>📺 Séries</button>
    <button>🎮 Games</button>

    <div class="divider"></div>

    <button>⏱ Histórico</button>
    <button>💾 Salvos</button>
    <button>⚙ Config</button>

</aside>

<!-- ================= MAIN ================= -->
<main class="main">

<header>

    <div class="topbar">
        <div class="logo-text">STREAM HUB</div>

        <div class="actions">
            <button>LOGIN</button>
            <button>ACESSAR</button>
            <button>PERFIL</button>
        </div>
    </div>

    <input class="search" placeholder="Pesquisar vídeos...">

</header>

<!-- ================= HERO ================= -->
<section class="hero">

    <div class="eyes">
        <div class="eye"><div class="pupil">👀</div></div>
        <div class="eye"><div class="pupil">👀</div></div>
    </div>

    <div class="carousel">

        <div class="tag">Recomendados</div>
        <div class="tag">Tendências</div>
        <div class="tag">Novos</div>
        <div class="tag">Para Você</div>

    </div>

</section>

<!-- ================= VIDEOS ================= -->
<section class="videos">

    <div class="card" data-type="music" data-link="https://www.youtube.com/watch?v=3JZ_D3ELwOQ">
        <img src="https://img.youtube.com/vi/3JZ_D3ELwOQ/hqdefault.jpg">
        <h3>Música Pop</h3>
        <p>Som envolvente para relaxar e sentir o ritmo.</p>
    </div>

    <div class="card" data-type="movie" data-link="https://www.youtube.com/watch?v=5NV6Rdv1a3I">
        <img src="https://img.youtube.com/vi/5NV6Rdv1a3I/hqdefault.jpg">
        <h3>Filme Ação</h3>
        <p>Trailer cinematográfico cheio de emoção.</p>
    </div>

    <div class="card" data-type="series" data-link="https://www.youtube.com/watch?v=kJQP7kiw5Fk">
        <img src="https://img.youtube.com/vi/kJQP7kiw5Fk/hqdefault.jpg">
        <h3>Série Drama</h3>
        <p>História intensa com episódios contínuos.</p>
    </div>

    <div class="card" data-type="game" data-link="https://www.youtube.com/watch?v=dQw4w9WgXcQ">
        <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/hqdefault.jpg">
        <h3>Gameplay</h3>
        <p>Jogadas épicas no mundo dos games.</p>
    </div>

</section>

<footer>

    <div class="menu">
        <button>Notícias</button>
        <button>Jogos</button>
        <button>Vídeos</button>
    </div>

    <button class="continue">CONTINUAR ASSISTINDO</button>

</footer>

<script src="script.js"></script>

</body>
</html>
